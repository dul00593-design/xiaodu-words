<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小杜的单词打卡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 20px; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .subtitle { font-size: 14px; opacity: 0.9; }
        .date { font-size: 12px; opacity: 0.8; margin-top: 5px; }
        .stats-card, .word-card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; text-align: center; }
        .stat-item .number { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-item .label { font-size: 12px; color: #666; margin-top: 5px; }
        .word-card h2 { font-size: 16px; margin-bottom: 15px; color: #333; display: flex; justify-content: space-between; align-items: center; }
        .progress { font-size: 14px; color: #667eea; }
        .word-item { padding: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .word-item:last-child { border-bottom: none; }
        .word-header { display: flex; justify-content: space-between; align-items: center; }
        .word-title { font-size: 18px; font-weight: bold; color: #333; }
        .sound-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; }
        .sound-btn:hover { transform: scale(1.2); }
        .word-phonetic { font-size: 14px; color: #667eea; margin: 5px 0; }
        .word-meaning { font-size: 14px; color: #666; }
        .word-example { font-size: 13px; color: #999; font-style: italic; display: none; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #e0e0e0; }
        .word-item.expanded .word-example { display: block; }
        .checkin-btn { width: 100%; padding: 18px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .checkin-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal.show { display: flex; }
        .modal-content { background: white; border-radius: 20px; padding: 30px; text-align: center; max-width: 300px; }
        .modal-content .icon { font-size: 60px; margin-bottom: 15px; }
        .modal-content h3 { font-size: 20px; margin-bottom: 10px; }
        .modal-content button { padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        .badge-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
        .badge { font-size: 11px; padding: 4px 8px; border-radius: 10px; background: #f0f0f0; color: #666; }
        .badge.earned { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #fff; }
        .tip { font-size: 12px; color: #999; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 小杜的单词打卡</h1>
            <p class="subtitle">每天10个，高考无忧</p>
            <p class="date" id="todayDate"></p>
        </div>
        <div class="stats-card">
            <div class="stats-grid">
                <div class="stat-item"><div class="number" id="totalDays">0</div><div class="label">坚持天数</div></div>
                <div class="stat-item"><div class="number" id="totalWords">0</div><div class="label">已学单词</div></div>
                <div class="stat-item"><div class="number" id="currentStreak">0</div><div class="label">连续打卡</div></div>
            </div>
            <div class="badge-list" id="badgeList"></div>
        </div>
        <div class="word-card">
            <h2>今日单词 <span class="progress" id="progress">0/10</span></h2>
            <div id="wordList"></div>
            <button class="checkin-btn" id="checkinBtn" onclick="checkIn()">完成今日打卡</button>
        </div>
        <p class="tip">💡 点击单词查看例句，点击🔊听发音</p>
    </div>
    <div class="modal" id="successModal">
        <div class="modal-content">
            <div class="icon">🎉</div>
            <h3>打卡成功！</h3>
            <p id="streakMsg">太棒了！继续保持！</p>
            <button onclick="closeModal()">好的</button>
        </div>
    </div>
<script>
const VOCAB_URL='https://raw.githubusercontent.com/wordswitch/wordswitch/master/data/words.txt';
let vocabulary=[];

function init(){document.getElementById('todayDate').textContent=new Date().toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});loadVocabulary();}
async function loadVocabulary(){try{const cache=localStorage.getItem('vocabularyCache');const cacheTime=localStorage.getItem('vocabularyCacheTime');if(cache&&cacheTime&&Date.now()-cacheTime<86400000){vocabulary=JSON.parse(cache);initTodayWords();}else{const res=await fetch(VOCAB_URL);const text=await res.text();vocabulary=text.split('\n').filter(w=>w.trim().length>2&&w.trim().length<15).map(w=>({word:w.trim().toLowerCase(),phonetic:'[点击🔊听发音]',meaning:'查看词典释义',example:'Practice makes perfect.'}));localStorage.setItem('vocabularyCache',JSON.stringify(vocabulary));localStorage.setItem('vocabularyCacheTime',Date.now());initTodayWords();}}catch(e){vocabulary=generateSampleWords();initTodayWords();}}
