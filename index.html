body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}

.stats-card,.word-card{background:white;border-radius:16px;padding:20px;margin-bottom:15px;box-shadow:0 4px 20px rgba(0,0,0,.1)}

.stat-item .number{font-size:28px;font-weight:bold;color:#667eea}
.stat-item .label{font-size:12px;color:#666;margin-top:5px}

.word-item{padding:15px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.word-item:last-child{border-bottom:none}
.word-title{font-size:18px;font-weight:bold;color:#333}
.sound-btn{background:none;border:none;font-size:20px;cursor:pointer}
.word-phonetic{font-size:14px;color:#667eea;margin:5px 0}
.word-meaning{font-size:14px;color:#666}
.word-example{font-size:13px;color:#999;font-style:italic;display:none;margin-top:10px;padding-top:10px;border-top:1px dashed #e0e0e0}
.word-item.expanded .word-example{display:block}
.checkin-btn{width:100%;padding:18px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:10px}
.checkin-btn:disabled{opacity:.5;cursor:not-allowed}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-content{background:white;border-radius:20px;padding:30px;text-align:center;max-width:300px}
.modal-content .icon{font-size:60px;margin-bottom:15px}
.checked-mark{background:#4caf50;color:white;padding:5px 10px;border-radius:5px;font-size:12px;margin-left:10px}
</style>
</head>

</div>
</div>
<div class="word-card">
<h2 id="cardTitle">今日单词</h2>
<div id="wordList"></div>
<button class="checkin-btn" id="checkinBtn" onclick="checkIn()">完成今日打卡</button>
</div>
</div>
<div class="modal" id="successModal">
<div class="modal-content">
<div class="icon">🎉</div>
<h3>打卡成功！</h3>

<button onclick="closeModal()">好的</button>
</div>
</div>

var todayWords=[];
var userData=JSON.parse(localStorage.getItem("xiaoduWords"))||{totalDays:0,totalWords:0,currentStreak:0,lastCheckIn:null};
var learnedToday=0;

function init(){
  var today=new Date().toDateString();
  if(userData.lastCheckIn===today){
    document.getElementById("checkinBtn").disabled=true;
    document.getElementById("checkinBtn").textContent="✓ 今日已打卡";
    document.getElementById("cardTitle").innerHTML="今日单词 <span class='checked-mark'>已打卡</span>";
  }
  var seed=new Date().getDate();
  var start=(seed*7)%vocabulary.length;
  todayWords=vocabulary.slice(start,start+10);
  renderWords();
  updateStats();
}

function renderWords(){
  var html="";
  for(var i=0;i<todayWords.length;i++){
    var w=todayWords[i];
    html+='<div class="word-item" onclick="toggleWord(this)">';
    html+='<div class="word-header"><div class="word-title">'+(i+1)+'. '+w.word+'</div>';
    html+='<button class="sound-btn" onclick="event.stopPropagation();speakWord(\''+w.word+'\')">🔊</button></div>';
    html+='<div class="word-phonetic">'+w.phonetic+'</div>';
    html+='<div class="word-meaning">'+w.meaning+'</div>';
    html+='<div class="word-example">'+w.example+'</div>';
    html+='</div>';
  }
  document.getElementById("wordList").innerHTML=html;
}

function toggleWord(el){
  el.classList.toggle("expanded");
  learnedToday++;
}

function speakWord(word){
  if('speechSynthesis' in window){
    var utterance=new SpeechSynthesisUtterance(word);
    utterance.lang='en-US';
    utterance.rate=0.8;
    speechSynthesis.speak(utterance);
  }
}

function updateStats(){
  document.getElementById("totalDays").textContent=userData.totalDays||0;
  document.getElementById("totalWords").textContent=userData.totalWords||0;
  document.getElementById("currentStreak").textContent=userData.currentStreak||0;
  console.log("Stats updated:", userData);
}

function checkIn(){
  var today=new Date().toDateString();
  if(userData.lastCheckIn===today){
    alert("今天已经打卡过了！");
    return;
  }
  userData.totalDays++;
  userData.totalWords+=10;
  var yesterday=new Date();
  yesterday.setDate(yesterday.getDate()-1);
  if(userData.lastCheckIn===yesterday.toDateString()){
    userData.currentStreak++;
  }else{
    userData.currentStreak=1;
  }
  userData.lastCheckIn=today;
  localStorage.setItem("xiaoduWords",JSON.stringify(userData));
  updateStats();
  document.getElementById("checkinBtn").disabled=true;
  document.getElementById("checkinBtn").textContent="✓ 今日已打卡";
  document.getElementById("cardTitle").innerHTML="今日单词 <span class='checked-mark'>已打卡</span>";
  document.getElementById("successModal").classList.add("show");
}

function closeModal(){
  document.getElementById("successModal").classList.remove("show");
}

init();
</script>
