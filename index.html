<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
.container{max-width:400px;margin:0 auto}
.header{text-align:center;color:white;margin-bottom:20px}
.header h1{font-size:24px;margin-bottom:5px}
.subtitle{font-size:14px;opacity:.9}
.date{font-size:12px;opacity:.8;margin-top:5px}
.stats-card,.word-card{background:white;border-radius:16px;padding:20px;margin-bottom:15px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;text-align:center}
.stat-item .number{font-size:28px;font-weight:bold;color:#667eea}
.stat-item .label{font-size:12px;color:#666;margin-top:5px}
.word-card h2{font-size:16px;margin-bottom:15px;color:#333;display:flex;justify-content:space-between}
.progress{font-size:14px;color:#667eea}
.word-item{padding:15px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.word-item:last-child{border-bottom:none}
.word-header{display:flex;justify-content:space-between;align-items:center}
.word-title{font-size:18px;font-weight:bold;color:#333}
.sound-btn{background:none;border:none;font-size:20px;cursor:pointer;padding:5px}
.sound-btn:hover{transform:scale(1.2)}
.word-phonetic{font-size:14px;color:#667eea;margin:5px 0}
.word-meaning{font-size:14px;color:#666}
.word-example{font-size:13px;color:#999;font-style:italic;display:none;margin-top:10px;padding-top:10px;border-top:1px dashed #e0e0e0}
.word-item.expanded .word-example{display:block}
.checkin-btn{width:100%;padding:18px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;font-size:18px;font-weight:bold;cursor:pointer;margin-top:10px}
.checkin-btn:disabled{opacity:.6;cursor:not-allowed}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-content{background:white;border-radius:20px;padding:30px;text-align:center;max-width:300px}
.modal-content .icon{font-size:60px;margin-bottom:15px}
.modal-content h3{font-size:20px;margin-bottom:10px}
.modal-content button{padding:12px 30px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer}
.badge-list{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:10px}
.badge{font-size:11px;padding:4px 8px;border-radius:10px;background:#f0f0f0;color:#666}
.badge.earned{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#fff}
.tip{font-size:12px;color:#999;text-align:center;margin-top:15px}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>📚 小杜的单词打卡</h1>
<p class="subtitle">每天10个，高考无忧</p>
<p class="date" id="todayDate"></p>
</div>
<div class="stats-card">
<div class="stats-grid">
<div class="stat-item"><div class="number" id="totalDays">0</div><div class="label">坚持天数</div></div>
<div class="stat-item"><div class="number" id="totalWords">0</div><div class="label">已学单词</div></div>
<div class="stat-item"><div class="number" id="currentStreak">0</div><div class="label">连续打卡</div></div>
</div>
<div class="badge-list" id="badgeList"></div>
</div>
<div class="word-card">
<h2>今日单词 <span class="progress" id="progress">0/10</span></h2>
<div id="wordList"></div>
<button class="checkin-btn" id="checkinBtn" onclick="checkIn()">完成今日打卡</button>
</div>
<p class="tip">💡 点击单词查看例句，点击🔊听发音</p>
</div>
<div class="modal" id="successModal">
<div class="modal-content">
<div class="icon">🎉</div>
<h3>打卡成功！</h3>
<p id="streakMsg">太棒了！继续保持！</p>
<button onclick="closeModal()">好的</button>
</div>
</div>

let todayWords=[];
let userData=JSON.parse(localStorage.getItem("xiaoduWords"))||{totalDays:0,totalWords:0,currentStreak:0,lastCheckIn:null,learnedWords:[],dayIndex:0};
let learnedToday=new Set();
function init(){
    document.getElementById("todayDate").textContent=new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
    initTodayWords();
}
function initTodayWords(){
    const seed=getDaySeed();
    let indices=[];
    for(let i=0;i<vocabulary.length;i++)indices.push(i);
    for(let i=indices.length-1;i>0;i--){const j=(seed+i)%indices.length;[indices[i],indices[j]]=[indices[j],indices[i]];}
    todayWords=indices.slice(0,10).map(i=>vocabulary[i]);
    renderWords();
    updateStats();
}
function getDaySeed(){const today=new Date();return today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();}
function renderWords(){
    const list=document.getElementById("wordList");
    list.innerHTML=todayWords.map((item,index)=>`<div class="word-item" onclick="toggleWord(${index})"><div class="word-header"><div class="word-title">${index+1}. ${item.word}</div><button class="sound-btn" onclick="event.stopPropagation();speakWord('${item.word}')">🔊</button></div><div class="word-phonetic">${item.phonetic}</div><div class="word-meaning">${item.meaning}</div><div class="word-example">${item.example}</div></div>`).join("");
}
function toggleWord(index){
    const items=document.querySelectorAll(".word-item");
    items[index].classList.toggle("expanded");
    learnedToday.add(index);
    document.getElementById("progress").textContent=`${learnedToday.size}/10`;
}
function speakWord(word){const utterance=new SpeechSynthesisUtterance(word);utterance.lang="en-US";speechSynthesis.speak(utterance);}
function updateStats(){document.getElementById("totalDays").textContent=userData.totalDays;document.getElementById("totalWords").textContent=userData.totalWords;document.getElementById("currentStreak").textContent=userData.currentStreak;updateBadges();}
function updateBadges(){
    const badges=[];
    if(userData.totalDays>=7)badges.push('<span class="badge earned">🏆 周满勤</span>');
    if(userData.totalDays>=30)badges.push('<span class="badge earned">🏅 月满勤</span>');
    if(userData.totalDays>=100)badges.push('<span class="badge earned">💎 百日达人</span>');
    if(userData.totalWords>=1000)badges.push('<span class="badge earned">📚 千词达人</span>');
    document.getElementById("badgeList").innerHTML=badges.join("");
}
function checkIn(){
    if(learnedToday.size<10){alert("请先学习完今天的10个单词！");return;}
    const today=new Date().toDateString();
    if(userData.lastCheckIn===today){alert("今天已经打卡过了！");return;}
    userData.totalDays++;
    userData.totalWords+=10;
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    if(userData.lastCheckIn===yesterday.toDateString()){userData.currentStreak++;}else{userData.currentStreak=1;}
    userData.lastCheckIn=today;
    localStorage.setItem("xiaoduWords",JSON.stringify(userData));
    updateStats();
    document.getElementById("successModal").classList.add("show");
}
function closeModal(){document.getElementById("successModal").classList.remove("show");}
init();
</script>
