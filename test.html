<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>小杜的单词打卡</title>
<style>
body{font-family:sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
.container{max-width:400px;margin:0 auto}
.header{text-align:center;color:white;margin-bottom:20px}
.stats-card,.word-card{background:white;border-radius:16px;padding:20px;margin-bottom:15px}
.word-item{padding:15px;border-bottom:1px solid #f0f0f0}
.word-title{font-size:18px;font-weight:bold}
.checkin-btn{width:100%;padding:18px;background:#667eea;color:white;border:none;border-radius:12px;font-size:18px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>📚 小杜的单词打卡</h1></div>
<div class="stats-card"><p id="stats">加载中...</p></div>
<div class="word-card"><div id="wordList"></div></div>
<button class="checkin-btn" onclick="checkIn()">完成打卡</button>
</div>
<script>
const vocabulary=[{word:"abandon",phonetic:"[əˈbændən]",meaning:"v. 抛弃"},{word:"ability",phonetic:"[əˈbɪləti]",meaning:"n. 能力"},{word:"able",phonetic:"[ˈeɪbl]",meaning:"a. 能够的"}];
document.getElementById('stats').textContent='共'+vocabulary.length+'个单词';
document.getElementById('wordList').innerHTML=vocabulary.map((w,i)=>'<div class="word-item"><div class="word-title">'+(i+1)+'. '+w.word+'</div><div>'+w.phonetic+' '+w.meaning+'</div></div>').join('');
function checkIn(){alert('打卡成功！');}
</script>
</body>
</html>
